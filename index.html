<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain - Sistema Integrado de Gestão</title>
  <meta name="description"
    content="Sistema de gestão empresarial completo para profissionais e empresas. Organização, fluxo e ferramentas integradas em um só lugar." />
  <meta name="theme-color" content="#e0e5ec" />

  <!-- SEO Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Brain - Sistema Integrado de Gestão" />
  <meta property="og:description" content="Sua central de produtividade e organização pessoal e profissional." />
  <link rel="icon" type="image/png" href="/favicon_brain_site.png" />

  <!-- Google API e Identity Services -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Fonte Inter para visual moderno e legível -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            win95: {
              bg: '#e0e5ec',
              light: '#ffffff',
              shadow: '#a3b1c6',
              dark: '#4a5568',
              blue: '#2563eb',
              blueLight: '#60a5fa'
            }
          },
          boxShadow: {
            'retro': '3px 3px 6px #b8b9be, -3px -3px 6px #ffffff',
            'retro-inset': 'inset 2px 2px 5px #b8b9be, inset -3px -3px 7px #ffffff',
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #e0e5ec;
      color: #1f2937;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s ease;
    }

    /* Modo Invertido (Dark Mode Moderno) */
    .invert-colors {
      filter: invert(1) hue-rotate(180deg);
    }

    .invert-colors img,
    .invert-colors video,
    .invert-colors iframe,
    .invert-colors .no-invert {
      filter: invert(1) hue-rotate(180deg);
    }

    /* Neo-Retro Raised (Relevo Suave) */
    .win95-raised {
      background-color: #e0e5ec;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 6px;
      box-shadow:
        4px 4px 8px #a3b1c6,
        -4px -4px 8px #ffffff;
      transition: all 0.2s ease;
    }

    /* Neo-Retro Sunken (Afundado Suave) */
    .win95-sunken {
      background-color: #f3f4f6;
      border-radius: 6px;
      box-shadow: inset 2px 2px 5px #cbd5e1, inset -2px -2px 5px #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    /* Botão Moderno com toque Retro */
    .win95-btn {
      background: #e0e5ec;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
      color: #374151;
      font-weight: 600;
      transition: all 0.1s ease;
    }

    .win95-btn:hover {
      transform: translateY(-1px);
      color: #2563eb;
    }

    .win95-btn:active {
      box-shadow: inset 2px 2px 5px #a3b1c6, inset -2px -2px 5px #ffffff;
      transform: translateY(1px);
    }

    .win95-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Scrollbar Moderna */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Utilitários de Texto */
    .text-shadow {
      text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.5);
    }
  </style>
</head>

<body class="min-h-screen select-none bg-[#e0e5ec]">
  <div id="root" class="min-h-screen"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
