
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YSoffice</title>
    
    <!-- Fonte Inter para visual moderno e legível -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              win95: {
                bg: '#e0e5ec', /* Mais claro e azulado que o original c0c0c0 */
                light: '#ffffff',
                shadow: '#a3b1c6', /* Sombra mais suave */
                dark: '#4a5568',
                blue: '#2563eb', /* Azul moderno (Royal Blue) */
                blueLight: '#60a5fa'
              }
            },
            boxShadow: {
              'retro': '3px 3px 6px #b8b9be, -3px -3px 6px #ffffff',
              'retro-inset': 'inset 2px 2px 5px #b8b9be, inset -3px -3px 7px #ffffff',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #e0e5ec;
        color: #1f2937;
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.3s ease;
      }
      
      /* Modo Invertido (Dark Mode Moderno) */
      .invert-colors {
        filter: invert(1) hue-rotate(180deg);
      }
      .invert-colors img, 
      .invert-colors video,
      .invert-colors iframe,
      .invert-colors .no-invert {
        filter: invert(1) hue-rotate(180deg);
      }

      /* Neo-Retro Raised (Relevo Suave) */
      .win95-raised {
        background-color: #e0e5ec;
        border: 1px solid rgba(255,255,255,0.4);
        border-radius: 6px;
        box-shadow: 
          4px 4px 8px #a3b1c6, 
          -4px -4px 8px #ffffff;
        transition: all 0.2s ease;
      }

      /* Neo-Retro Sunken (Afundado Suave) */
      .win95-sunken {
        background-color: #f3f4f6;
        border-radius: 6px;
        box-shadow: inset 2px 2px 5px #cbd5e1, inset -2px -2px 5px #ffffff;
        border: 1px solid rgba(0,0,0,0.05);
      }

      /* Botão Moderno com toque Retro */
      .win95-btn {
        background: #e0e5ec;
        border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
        color: #374151;
        font-weight: 600;
        transition: all 0.1s ease;
      }

      .win95-btn:hover {
        transform: translateY(-1px);
        color: #2563eb;
      }

      .win95-btn:active {
        box-shadow: inset 2px 2px 5px #a3b1c6, inset -2px -2px 5px #ffffff;
        transform: translateY(1px);
      }
      
      .win95-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      /* Scrollbar Moderna */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      
      /* Utilitários de Texto */
      .text-shadow {
        text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.94.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "pdf-lib": "https://esm.sh/pdf-lib@^1.17.1",
    "pdfjs-dist": "https://esm.sh/pdfjs-dist@4.10.38"
  }
}
</script>
</head>
  <body class="h-screen overflow-hidden select-none bg-[#e0e5ec]">
    <div id="root" class="h-full"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
