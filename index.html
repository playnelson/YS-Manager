
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YSoffice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              win95: {
                bg: '#c0c0c0',
                light: '#ffffff',
                shadow: '#808080',
                dark: '#000000',
                blue: '#000080',
                blueLight: '#1084d0'
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Tahoma', 'Verdana', sans-serif;
        background-color: #c0c0c0; /* Standard Windows Gray */
        color: black;
        image-rendering: pixelated;
        transition: filter 0.3s ease;
      }
      
      /* Modo Invertido (Dark Mode Retro) */
      .invert-colors {
        filter: invert(1) hue-rotate(180deg);
      }
      
      /* Preserva imagens e vídeos de serem invertidos */
      .invert-colors img, 
      .invert-colors video,
      .invert-colors iframe {
        filter: invert(1) hue-rotate(180deg);
      }

      /* Efeito Relevo (Raised) */
      .win95-raised {
        border-top: 2px solid #ffffff;
        border-left: 2px solid #ffffff;
        border-right: 2px solid #808080;
        border-bottom: 2px solid #808080;
        box-shadow: inset 1px 1px 0px #ffffff, 1px 1px 0px #000000;
        background-color: #c0c0c0;
      }

      /* Efeito Afundado (Sunken) */
      .win95-sunken {
        border-top: 2px solid #808080;
        border-left: 2px solid #808080;
        border-right: 2px solid #ffffff;
        border-bottom: 2px solid #ffffff;
        box-shadow: inset 1px 1px 0px #000000;
        background-color: #ffffff;
      }

      /* Botão Ativo/Pressionado */
      .win95-btn:active {
        border-top: 2px solid #808080;
        border-left: 2px solid #808080;
        border-right: 2px solid #ffffff;
        border-bottom: 2px solid #ffffff;
        box-shadow: inset 1px 1px 0px #000000;
        padding-top: 2px;
        padding-left: 2px;
      }

      ::-webkit-scrollbar {
        width: 16px;
      }
      ::-webkit-scrollbar-track {
        background: #c0c0c0;
      }
      ::-webkit-scrollbar-thumb {
        background: #c0c0c0;
        border-top: 2px solid #ffffff;
        border-left: 2px solid #ffffff;
        border-right: 2px solid #808080;
        border-bottom: 2px solid #808080;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.94.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "pdf-lib": "https://esm.sh/pdf-lib@^1.17.1"
  }
}
</script>
</head>
  <body class="h-screen overflow-hidden select-none bg-[#c0c0c0]">
    <div id="root" class="h-full"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
