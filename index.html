<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain - Sistema Integrado de Gestão</title>
  <meta name="description"
    content="Sistema de gestão empresarial completo para profissionais e empresas. Organização, fluxo e ferramentas integradas em um só lugar." />
  <meta name="theme-color" content="#111827" />

  <!-- SEO Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Brain - Sistema Integrado de Gestão" />
  <meta property="og:description" content="Sua central de produtividade e organização pessoal e profissional." />
  <link rel="icon" type="image/png" href="/favicon_brain_site.png" />

  <!-- Google API e Identity Services -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- Material Symbols Outlined (ícones do novo layout) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            primary: '#111827',
            'background-light': '#F9FAFB',
            'background-dark': '#111111',
            win95: {
              bg: '#e0e5ec',
              light: '#ffffff',
              shadow: '#a3b1c6',
              dark: '#4a5568',
              blue: '#2563eb',
              blueLight: '#60a5fa'
            }
          },
        }
      }
    }
  </script>
  <style>
    /* Material Symbols default style */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      font-size: 20px;
      vertical-align: middle;
      line-height: 1;
    }

    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar Moderna */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #374151;
    }

    /* Hide scrollbar utility */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Spin animation for lucide */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }
  </style>
</head>

<body class="min-h-screen select-none bg-gray-50 dark:bg-[#111111]">
  <div id="root" class="min-h-screen"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
