<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain - Sistema Integrado de Gestão</title>
  <meta name="description"
    content="Sistema de gestão empresarial completo para profissionais e empresas. Organização, fluxo e ferramentas integradas em um só lugar." />
  <meta name="theme-color" content="#111827" />

  <!-- SEO Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Brain - Sistema Integrado de Gestão" />
  <meta property="og:description" content="Sua central de produtividade e organização pessoal e profissional." />
  <link rel="icon" type="image/png" href="/favicon_brain_site.png" />

  <!-- Google API e Identity Services -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- Material Symbols Outlined (ícones do novo layout) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            primary: '#111827',
            'background-light': '#F2EFE5',
            'background-dark': '#111111',
            palette: {
              darkest: '#B4B4B8',
              mediumDark: '#C7C8CC',
              mediumLight: '#E3E1D9',
              lightest: '#F2EFE5',
            },
            win95: {
              bg: '#E3E1D9',
              light: '#F2EFE5',
              shadow: '#C7C8CC',
              dark: '#B4B4B8',
              blue: '#2563eb',
              blueLight: '#60a5fa'
            }
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --apple-bg: #F2EFE5;
      --apple-card: #E3E1D9;
      --apple-text: #1D1D1F;
      --apple-secondary: #B4B4B8;
      --apple-border: #C7C8CC;
      --apple-button: #1D1D1F;
      --win95-bg: #E3E1D9;
      --win95-light: #F2EFE5;
      --win95-shadow: #C7C8CC;
    }

    .dark {
      --win95-bg: #2d2d2d;
      --win95-light: #404040;
      --win95-shadow: #1a1a1a;
    }

    /* Retro UI Utilities */
    .win95-raised {
      background-color: var(--win95-bg);
      border: 2px solid;
      border-color: var(--win95-light) var(--win95-shadow) var(--win95-shadow) var(--win95-light);
    }

    .win95-sunken {
      background-color: var(--win95-bg);
      border: 2px solid;
      border-color: var(--win95-shadow) var(--win95-light) var(--win95-light) var(--win95-shadow);
    }

    .win95-btn {
      background-color: var(--win95-bg);
      border: 2px solid;
      border-color: var(--win95-light) var(--win95-shadow) var(--win95-shadow) var(--win95-light);
      padding: 4px 8px;
    }

    .win95-btn:active {
      border-color: var(--win95-shadow) var(--win95-light) var(--win95-light) var(--win95-shadow);
    }

    /* Material Symbols default style */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      font-size: 20px;
      vertical-align: middle;
      line-height: 1;
    }

    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .squircle {
      border-radius: 40px;
    }

    .input-apple {
      width: 100%;
      padding: 0.75rem 1rem;
      background-color: white;
      border: 1px solid var(--apple-border);
      border-radius: 0.75rem;
      transition: all 0.2s;
      outline: none;
      font-size: 0.875rem;
    }

    .input-apple:focus {
      border-color: #888;
      box-shadow: 0 0 0 1px #888;
    }

    .btn-apple-primary {
      width: 100%;
      padding: 0.875rem;
      background-color: var(--apple-button);
      color: white;
      font-weight: 600;
      border-radius: 0.75rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.875rem;
    }

    .btn-apple-primary:hover {
      opacity: 0.9;
    }

    .btn-apple-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-apple-social {
      width: 100%;
      padding: 0.75rem;
      background-color: white;
      border: 1px solid var(--apple-border);
      color: var(--apple-text);
      font-weight: 500;
      border-radius: 0.75rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      font-size: 0.875rem;
    }

    .btn-apple-social:hover {
      background-color: #f9f9f9;
    }

    /* Scrollbar Moderna */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #374151;
    }

    /* Hide scrollbar utility */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Spin animation for lucide */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }
  </style>
</head>

<body class="min-h-screen select-none bg-palette-lightest dark:bg-[#111111]">
  <div id="root" class="min-h-screen"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
